<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jane Doe — Software Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500&family=Space+Mono:wght@400;700&family=Playfair+Display:wght@400;700&family=Silkscreen&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* =============================================
           THEME VARIABLES — each theme overrides :root
           ============================================= */
        :root {
            /* — Cool Minimal (default) — */
            --bg: #f5f8fa;
            --bg-card: transparent;
            --ink: #0b1620;
            --text: #1a2a3a;
            --text-secondary: #4a6275;
            --muted: #8da4b8;
            --border: #c4d6e3;
            --surface: #e8eff4;
            --accent: #2ec4b6;
            --accent-bar-bg: linear-gradient(90deg, #2ec4b6, #8da4b8, #2ec4b6);
            --font-display: 'DM Serif Display', serif;
            --font-body: 'Outfit', sans-serif;
            --font-weight-body: 300;
            --font-weight-display: 400;
            --photo-radius: 50%;
            --photo-border: 1px solid var(--border);
            --photo-shadow: none;
            --card-border: none;
            --card-padding: 0;
            --card-radius: 0;
            --card-shadow: none;
            --btn-radius: 2px;
            --btn-bg: transparent;
            --btn-border: 1px solid var(--border);
            --label-transform: uppercase;
            --name-size: 2.75rem;
            --body-line-height: 1.7;
            --noise-opacity: 0.025;
            --scanline: none;
            --transition-duration: 0.6s;
        }

        /* — Brutalist — */
        html[data-theme="brutalist"] {
            --bg: #ffffff;
            --bg-card: transparent;
            --ink: #000000;
            --text: #000000;
            --text-secondary: #333333;
            --muted: #666666;
            --border: #000000;
            --surface: #f0f0f0;
            --accent: #ff0000;
            --accent-bar-bg: #000000;
            --font-display: 'Space Mono', monospace;
            --font-body: 'Space Mono', monospace;
            --font-weight-body: 400;
            --font-weight-display: 700;
            --photo-radius: 0;
            --photo-border: 4px solid #000;
            --photo-shadow: 8px 8px 0 #000;
            --card-border: none;
            --card-padding: 0;
            --card-radius: 0;
            --card-shadow: none;
            --btn-radius: 0;
            --btn-bg: #000;
            --btn-border: 4px solid #000;
            --label-transform: uppercase;
            --name-size: 3rem;
            --body-line-height: 1.6;
            --noise-opacity: 0;
            --scanline: none;
        }

        /* — Vaporwave — */
        html[data-theme="vaporwave"] {
            --bg: #1a0a2e;
            --bg-card: transparent;
            --ink: #ff6ec7;
            --text: #e0c3fc;
            --text-secondary: #b794d6;
            --muted: #7c5cbf;
            --border: rgba(255, 110, 199, 0.3);
            --surface: rgba(255, 110, 199, 0.08);
            --accent: #00f0ff;
            --accent-bar-bg: linear-gradient(90deg, #ff6ec7, #00f0ff, #ff6ec7);
            --font-display: 'Silkscreen', monospace;
            --font-body: 'Outfit', sans-serif;
            --font-weight-body: 300;
            --font-weight-display: 400;
            --photo-radius: 12px;
            --photo-border: 2px solid rgba(0, 240, 255, 0.5);
            --photo-shadow: 0 0 30px rgba(255, 110, 199, 0.3), 0 0 60px rgba(0, 240, 255, 0.15);
            --card-border: none;
            --card-padding: 0;
            --card-radius: 0;
            --card-shadow: none;
            --btn-radius: 0;
            --btn-bg: rgba(0, 240, 255, 0.08);
            --btn-border: 1px solid rgba(0, 240, 255, 0.4);
            --label-transform: uppercase;
            --name-size: 2.5rem;
            --body-line-height: 1.8;
            --noise-opacity: 0.04;
            --scanline: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
        }

        /* — Terminal — */
        html[data-theme="terminal"] {
            --bg: #0a0e14;
            --bg-card: transparent;
            --ink: #00ff41;
            --text: #00ff41;
            --text-secondary: #00cc33;
            --muted: #008f23;
            --border: #00ff4133;
            --surface: #00ff4108;
            --accent: #00ff41;
            --accent-bar-bg: #00ff41;
            --font-display: 'Space Mono', monospace;
            --font-body: 'Space Mono', monospace;
            --font-weight-body: 400;
            --font-weight-display: 700;
            --photo-radius: 4px;
            --photo-border: 1px solid #00ff4144;
            --photo-shadow: 0 0 20px rgba(0, 255, 65, 0.15);
            --card-border: none;
            --card-padding: 0;
            --card-radius: 0;
            --card-shadow: none;
            --btn-radius: 0;
            --btn-bg: transparent;
            --btn-border: 1px solid #00ff4144;
            --label-transform: uppercase;
            --name-size: 2.2rem;
            --body-line-height: 1.7;
            --noise-opacity: 0.03;
            --scanline: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,255,65,0.03) 1px, rgba(0,255,65,0.03) 2px);
        }

        /* — Warm Luxury — */
        html[data-theme="luxury"] {
            --bg: #110e0a;
            --bg-card: transparent;
            --ink: #d4a853;
            --text: #c9b99a;
            --text-secondary: #9a8b72;
            --muted: #6b5f4e;
            --border: rgba(212, 168, 83, 0.2);
            --surface: rgba(212, 168, 83, 0.05);
            --accent: #d4a853;
            --accent-bar-bg: linear-gradient(90deg, #d4a853, #8b6f35, #d4a853);
            --font-display: 'Playfair Display', serif;
            --font-body: 'Cormorant Garamond', serif;
            --font-weight-body: 300;
            --font-weight-display: 400;
            --photo-radius: 50%;
            --photo-border: 1px solid rgba(212, 168, 83, 0.3);
            --photo-shadow: 0 4px 40px rgba(0,0,0,0.5);
            --card-border: none;
            --card-padding: 0;
            --card-radius: 0;
            --card-shadow: none;
            --btn-radius: 0;
            --btn-bg: transparent;
            --btn-border: 1px solid rgba(212, 168, 83, 0.3);
            --label-transform: uppercase;
            --name-size: 3.2rem;
            --body-line-height: 1.9;
            --noise-opacity: 0.02;
            --scanline: none;
        }

        /* =============================================
           BASE STYLES — driven by variables
           ============================================= */

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            font-weight: var(--font-weight-body);
            background-color: var(--bg);
            color: var(--text);
            line-height: var(--body-line-height);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            transition: background-color var(--transition-duration) ease,
                        color var(--transition-duration) ease,
                        font-family 0s;
        }

        /* — Noise texture overlay — */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: var(--noise-opacity);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px;
            pointer-events: none;
            z-index: 100;
        }

        /* — Scanline overlay — */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--scanline);
            pointer-events: none;
            z-index: 101;
        }

        /* — Top accent line — */
        .accent-bar {
            height: 3px;
            background: var(--accent-bar-bg);
            background-size: 200% 100%;
            animation: shimmer 8s ease-in-out infinite;
            transition: background var(--transition-duration) ease;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* — Layout — */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
        }

        .card {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 4rem;
            max-width: 820px;
            width: 100%;
            background: var(--bg-card);
            border: var(--card-border);
            border-radius: var(--card-radius);
            padding: var(--card-padding);
            box-shadow: var(--card-shadow);
            transition: all var(--transition-duration) ease;
        }

        /* — Photo — */
        .photo-wrap {
            position: relative;
            width: 200px;
            height: 200px;
            flex-shrink: 0;
            transition: all var(--transition-duration) ease;
        }

        .photo-wrap::before {
            content: '';
            position: absolute;
            inset: -6px;
            border: var(--photo-border);
            border-radius: var(--photo-radius);
            transition: all var(--transition-duration) ease;
        }

        .photo-wrap:hover::before {
            border-color: var(--accent);
        }

        .photo-wrap::after {
            content: 'photo taken during grocery rescue for FamilyWorks';
            position: absolute;
            bottom: -2.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            font-family: var(--font-body);
            font-size: 0.72rem;
            font-weight: 400;
            color: var(--text-secondary);
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 0.3rem 0.75rem;
            border-radius: 2px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 10;
        }

        .photo-wrap:hover::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .photo {
            width: 100%;
            height: 100%;
            border-radius: var(--photo-radius);
            background-color: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: var(--photo-shadow);
            transition: all var(--transition-duration) ease;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-placeholder {
            color: var(--muted);
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: color var(--transition-duration) ease;
        }

        /* — Content — */
        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1.25rem;
        }

        .label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: var(--label-transform);
            color: var(--accent);
            transition: color var(--transition-duration) ease;
        }

        h1 {
            font-family: var(--font-display);
            font-size: var(--name-size);
            font-weight: var(--font-weight-display);
            color: var(--ink);
            line-height: 1.15;
            letter-spacing: -0.01em;
            transition: color var(--transition-duration) ease,
                        font-size var(--transition-duration) ease;
        }

        .bio {
            max-width: 440px;
            color: var(--text-secondary);
            font-size: 1.02rem;
            transition: color var(--transition-duration) ease;
        }

        /* — Divider — */
        .divider {
            width: 32px;
            height: 1px;
            background: var(--border);
            transition: background var(--transition-duration) ease;
        }

        /* — Links — */
        .links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .resume-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text);
            text-decoration: none;
            padding: 0.6rem 1.4rem;
            border: var(--btn-border);
            border-radius: var(--btn-radius);
            background: var(--btn-bg);
            position: relative;
            transition: all 0.3s ease;
        }

        .resume-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .resume-link:hover {
            color: var(--ink);
            border-color: var(--accent);
        }

        .resume-link:hover::after {
            width: 100%;
        }

        .resume-link svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            transition: transform 0.3s ease;
        }

        .resume-link:hover svg {
            transform: translateY(1px);
        }

        .social-link {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
        }

        .social-link:hover {
            color: var(--accent);
        }

        .social-link svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* — Brutalist overrides — */
        html[data-theme="brutalist"] .resume-link {
            color: #fff;
            background: #000;
            font-weight: 700;
        }
        html[data-theme="brutalist"] .resume-link:hover {
            color: #000;
            background: #ff0000;
            border-color: #ff0000;
        }
        html[data-theme="brutalist"] .resume-link svg {
            stroke: currentColor;
        }
        html[data-theme="brutalist"] .accent-bar {
            height: 6px;
        }

        /* — Terminal prefix — */
        html[data-theme="terminal"] .label::before {
            content: '> ';
        }
        html[data-theme="terminal"] .bio::before {
            content: '$ cat bio.txt\A';
            white-space: pre;
            color: var(--muted);
            font-size: 0.8em;
        }
        html[data-theme="terminal"] h1::before {
            content: '# ';
            color: var(--muted);
        }

        /* — Vaporwave glow — */
        html[data-theme="vaporwave"] h1 {
            text-shadow: 0 0 40px rgba(255, 110, 199, 0.4);
        }
        html[data-theme="vaporwave"] .accent-bar {
            height: 2px;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
        }

        /* — Luxury letter spacing — */
        html[data-theme="luxury"] .label {
            letter-spacing: 0.25em;
        }
        html[data-theme="luxury"] h1 {
            letter-spacing: 0.02em;
        }
        html[data-theme="luxury"] .bio {
            font-size: 1.12rem;
        }

        /* — Footer — */
        footer {
            padding: 2rem;
            text-align: center;
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.04em;
            transition: color var(--transition-duration) ease;
        }

        /* — Vibrate animation — */
        @keyframes vibrate {
            0%  { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-2px, 1px) rotate(-0.5deg); }
            20% { transform: translate(2px, -1px) rotate(0.5deg); }
            30% { transform: translate(-3px, 2px) rotate(-1deg); }
            40% { transform: translate(3px, -2px) rotate(1deg); }
            50% { transform: translate(-2px, 3px) rotate(-0.5deg); }
            60% { transform: translate(3px, 1px) rotate(0.5deg); }
            70% { transform: translate(-3px, -1px) rotate(-1deg); }
            80% { transform: translate(2px, 2px) rotate(0.5deg); }
            90% { transform: translate(-1px, -2px) rotate(-0.5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .vibrating .card {
            animation: vibrate 0.08s linear infinite;
        }

        .vibrating .accent-bar {
            animation: vibrate 0.06s linear infinite;
        }

        /* — Initial load animation — */
        .loading .card,
        .loading .accent-bar {
            animation: rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* — Theme indicator — */
        .theme-indicator {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            font-size: 0.65rem;
            font-family: var(--font-body);
            color: var(--muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.4s ease, color 0.4s ease;
            pointer-events: none;
            z-index: 50;
        }

        .theme-indicator.visible {
            opacity: 1;
        }

        /* — Countdown bar — */
        .countdown-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 2px;
            background: var(--accent);
            opacity: 0.3;
            transition: width 0.1s linear, background var(--transition-duration) ease;
            z-index: 50;
        }

        /* — Quit button — */
        .quit-btn {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            font-family: var(--font-body);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 0.45rem 1rem;
            cursor: pointer;
            z-index: 50;
            transition: color 0.3s ease, border-color 0.3s ease, opacity 0.4s ease;
        }

        .quit-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .quit-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* — Responsive — */
        @media (max-width: 680px) {
            main {
                padding: 3rem 1.5rem;
            }

            .card {
                grid-template-columns: 1fr;
                gap: 2.5rem;
                justify-items: center;
                text-align: center;
            }

            .photo-wrap {
                width: 160px;
                height: 160px;
            }

            .content {
                align-items: center;
            }

            h1 {
                font-size: 2.1rem !important;
            }

            .bio {
                max-width: 360px;
            }

            .links {
                justify-content: center;
            }

            .divider {
                margin: 0 auto;
            }
        }
    </style>
</head>
<body class="loading">
    <div class="accent-bar"></div>

    <main>
        <div class="card">
            <div class="photo-wrap">
                <div class="photo">
                    <img src="photo.jpg" alt="Gary Berg" title="grocery rescue for Family Works">
                </div>
            </div>

            <div class="content">
                <span class="label">Engineering Manager</span>
                <h1>Gary Berg</h1>
                <p class="bio">
                    Software engineering leader with 8+ years of experience in data intensive applications and distributed systems. 
                </p>
                <div class="divider"></div>
                <div class="links">
                    <a href="resume.pdf" class="resume-link">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Résumé
                    </a>
                    <a href="https://linkedin.com/in/gary-berg" class="social-link" aria-label="LinkedIn" target="_blank" rel="noopener">
                        <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Gary Berg
    </footer>

    <button class="quit-btn">Quit it</button>
    <div class="theme-indicator"></div>
    <div class="countdown-bar"></div>

    <script>
        /* =========================================
           CONFIGURATION — change this value
           ========================================= */
        const INTERVAL_SECONDS = 10;

        /* ========================================= */

        const themes = [
            { id: 'default',   name: 'Minimal' },
            { id: 'brutalist', name: 'Brutalist' },
            { id: 'vaporwave', name: 'Vaporwave' },
            { id: 'terminal',  name: 'Terminal' },
            { id: 'luxury',    name: 'Luxury' },
        ];

        let currentIndex = 0;
        const root = document.documentElement;
        const indicator = document.querySelector('.theme-indicator');
        const countdownBar = document.querySelector('.countdown-bar');
        const VIBRATE_DURATION = 800;

        // Remove loading class after initial animation
        setTimeout(() => document.body.classList.remove('loading'), 1000);

        function setTheme(themeId) {
            if (themeId === 'default') {
                root.removeAttribute('data-theme');
            } else {
                root.setAttribute('data-theme', themeId);
            }
        }

        function showIndicator(name) {
            indicator.textContent = name;
            indicator.classList.add('visible');
            setTimeout(() => indicator.classList.remove('visible'), 2000);
        }

        function cycleTheme() {
            // Start vibrating
            document.body.classList.add('vibrating');

            setTimeout(() => {
                // Stop vibrating, switch theme
                document.body.classList.remove('vibrating');
                currentIndex = (currentIndex + 1) % themes.length;
                const theme = themes[currentIndex];
                setTheme(theme.id);
                showIndicator(theme.name);
            }, VIBRATE_DURATION);
        }

        // Countdown bar animation
        let startTime = Date.now();
        const intervalMs = INTERVAL_SECONDS * 1000;
        let cycling = true;
        let cycleTimer = null;
        let countdownFrame = null;

        function updateCountdown() {
            if (!cycling) return;
            const elapsed = Date.now() - startTime;
            const progress = (elapsed % intervalMs) / intervalMs;
            countdownBar.style.width = (progress * 100) + '%';
            countdownFrame = requestAnimationFrame(updateCountdown);
        }
        countdownFrame = requestAnimationFrame(updateCountdown);

        // Cycle themes
        cycleTimer = setInterval(() => {
            cycleTheme();
            startTime = Date.now();
        }, intervalMs);

        // Quit button
        const quitBtn = document.querySelector('.quit-btn');
        quitBtn.addEventListener('click', () => {
            cycling = false;
            clearInterval(cycleTimer);
            cancelAnimationFrame(countdownFrame);
            document.body.classList.remove('vibrating');
            countdownBar.style.width = '0';
            quitBtn.classList.add('hidden');
        });
    </script>
</body>
</html>
